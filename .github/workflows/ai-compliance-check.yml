name: Run AI Compliance Check (POs)

# Same verified schedule as send-notifications.yml: 10am-6pm IST, Mon-Sat.
# IST = UTC+5:30, so 10:00-18:00 IST = 04:30-12:30 UTC.
# Cron day-of-week: 0=Sunday...6=Saturday, so 1-6 = Monday-Saturday.
on:
  schedule:
    - cron: '30 4-12 * * 1-6'
  workflow_dispatch:   # lets you trigger it manually from GitHub's Actions tab too

jobs:
  ai-check:
    runs-on: ubuntu-latest
    steps:
      - name: Re-check Zoho for new/changed POs and run AI compliance judging
        run: |
          curl -s "https://finance-dashboard-liard-three.vercel.app/api/process-ai-queue?tab=po&refresh=1" -o response-po.json --max-time 280
          cat response-po.json
      - name: Re-check Zoho for new/changed Bills and run AI compliance judging
        run: |
          curl -s "https://finance-dashboard-liard-three.vercel.app/api/process-ai-queue?tab=bill&refresh=1" -o response-bill.json --max-time 280
          cat response-bill.json
      - name: Re-check Zoho for new/changed PMOs and run AI compliance judging
        run: |
          curl -s "https://finance-dashboard-liard-three.vercel.app/api/process-ai-queue?tab=pmo&refresh=1" -o response-pmo.json --max-time 280
          cat response-pmo.json
